[build]
  command = "bash build.sh"
  publish = "."
  ignore = "exit 0"  # Disable auto-deploy on git push. Deploy manually via Netlify UI or build hook.

# HTML — always revalidate
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, must-revalidate"

# JS/CSS — cache with version busting (?v=N)
[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Images — cache aggressively (rarely change)
[[headers]]
  for = "/img/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

# Root — revalidate
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
